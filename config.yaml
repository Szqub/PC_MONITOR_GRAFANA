# ByteTech Agent Configuration
# Generated by installer or created manually from this template.

influx:
  url: "http://YOUR_INFLUXDB_HOST:8086"
  token: "YOUR_INFLUXDB_TOKEN"
  org: "YOUR_ORG"
  bucket: "metrics"

metadata:
  host_alias: "MY-PC"
  site: "Home"
  owner: "User"

timing:
  hw_interval_sec: 2
  fps_interval_sec: 1

providers:
  lhm_enabled: true
  presentmon_enabled: true
  display_provider_enabled: true
  nvapi_provider_enabled: true
  system_provider_enabled: true

lhm:
  # LHM JSON API URL (fallback when WMI namespace unavailable)
  # LibreHardwareMonitor exposes data at http://127.0.0.1:8085/data.json
  json_url: "http://127.0.0.1:8085"

presentmon:
  # valid values:
  # - active_foreground
  # - explicit_process_name
  # - explicit_process_id
  target_mode: "active_foreground"
  process_name: ""
  process_id: 0
  executable_path: ""

logging:
  level: "INFO"
  log_dir: "logs"

buffer:
  enabled: true
  max_memory_points: 10000
  spool_dir: "spool"
  max_spool_files: 50

options:
  tags_extra:
    device_class: "desktop"
  custom_fields: {}
  # Note: retention_hint_days is an agent-side hint only.
  # Actual retention MUST be configured on the InfluxDB bucket itself.
  retention_hint_days: 2
